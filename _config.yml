# 站点基本信息
title: "FENG Yunxing | 冯云幸"
name: "冯云幸 (FENG Yunxing)"
description: "Ph.D. Student at HIT & PolyU | Structural Engineering"
url: "https://fengyunxing01.github.io"
baseurl: "" # 如果你的仓库名不是 fengyunxing01.github.io，请填入 /仓库名

# 个人资料设置 (Minimal Mistakes 规范)
author:
  name: "冯云幸 (FENG Yunxing)"
  avatar: "/images/bio-photo.jpg" # 确保 images 文件夹下有这张照片
  bio: "哈工大 / 香港理大 联合培养博士生"
  location: "Harbin / Hong Kong"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:fyxokk@163.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/fengyunxing01"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/" # 替换为你的主页链接

# 主题与插件
theme: minimal-mistakes-jekyll # 必须声明主题
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# 布局设置
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single" # 使用 single 布局才会显示侧边栏
      author_profile: true # 强制开启作者信息栏

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
